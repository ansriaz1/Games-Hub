<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Fun Mini Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎉 Ultimate Fun Mini Games 🎉</h1>
    <p>Play exciting games instantly!</p>
  </header>

  <main>
    <div class="game-button" onclick="showGame('dot')">Catch the Dot</div>
    <div class="game-button" onclick="showGame('coin')">Coin Flip</div>
    <div class="game-button" onclick="showGame('rps')">Rock-Paper-Scissors</div>
    <div class="game-button" onclick="showGame('ludo')">Ludo</div>

    <div id="game-container"></div>
  </main>

  <footer>
    <p>Made with ❤️ by Ans Riaz</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
